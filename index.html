<style>

  :root{

    --paper-dark:#e9dfc4;

    --burgundy:#7c2a2a;

  *{box-sizing:border-box;}

  body{

    min-height:100vh;

    color:var(--ink);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px 16px;
  }

    max-width:640px;
    background:var(--paper);
    background-image:

    border-radius:6px;
    position:relative;
    padding:14px;
    box-shadow:
      0 30px 60px -20px rgba(0,0,0,0.55),
      0 0 0 1px rgba(0,0,0,0.15);
  }

  .frame::before{
    content:"";
    position:absolute;
    inset:14px;
    border:1.5px solid var(--gold);
    border-radius:3px;
    pointer-events:none;
    opacity:0.55;
  }

  .inner{
    position:relative;
    padding:38px 34px 30px;
  }

  .crest{
    display:flex;
    justify-content:center;
    margin-bottom:6px;
  }
  .crest svg{ width:52px; height:52px; opacity:0.9; }

  h1{
    font-family:'Playfair Display', serif;
    font-weight:700;
    font-style:italic;
    text-align:center;
    font-size:1.7rem;
    line-height:1.25;
    margin:6px 0 4px;
    color:var(--bottle-deep);
    letter-spacing:0.2px;
  }

  .subtitle{
    text-align:center;
    font-family:'Inter', sans-serif;
    font-size:0.68rem;
    letter-spacing:0.22em;
    text-transform:uppercase;
    color:var(--gold);
    font-weight:600;
    margin-bottom:22px;
  }

  .rule{
    height:1px;
    background:linear-gradient(to right, transparent, var(--gold), transparent);
    margin:0 0 24px;
    opacity:0.7;
  }

  .langbar{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:26px;
  }
  .langbtn{
    font-family:'Inter', sans-serif;
    font-size:0.72rem;
    font-weight:600;
    letter-spacing:0.08em;
    padding:8px 16px;
    border-radius:999px;
    border:1.5px solid var(--gold);
    background:transparent;
    color:var(--bottle-deep);
    cursor:pointer;
    transition:all 0.25s ease;
  }
  .langbtn:hover{ background:rgba(175,138,78,0.15); }
  .langbtn.active{
    background:var(--burgundy);

    margin-bottom:8px;
    font-weight:600;

    font-style:italic;

    font-size:0.95rem;
  }

  .toolbar{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-top:26px;
    flex-wrap:wrap;
  }
  .ghostbtn{
    font-family:'Inter', sans-serif;
    font-size:0.7rem;
    font-weight:600;
    letter-spacing:0.05em;
    color:var(--sage);
    background:transparent;
    border:1px solid var(--sage);

    border-radius:999px;
    cursor:pointer;

  }
  .ghostbtn:hover{ background:var(--sage); color:var(--paper); }

  .count{
    text-align:center;
    font-family:'Inter', sans-serif;
    font-size:0.68rem;
    letter-spacing:0.1em;
    color:#8a8270;
    margin-top:18px;
  }

  .motto{
    text-align:center;
    font-family:'Playfair Display', serif;
    font-style:italic;
    font-size:0.72rem;
    color:var(--gold);
    letter-spacing:0.04em;
    margin-top:22px;
    opacity:0.85;
  }

  @media (max-width:480px){
    .inner{ padding:30px 18px 24px; }
    h1{ font-size:1.35rem; }
    button#genBtn{ padding:14px 30px; font-size:0.9rem; }
  }
</style>
</head>

let currentLang = 'fr';

const els = {
  title: document.getElementById('title'),
  subtitle: document.getElementById('subtitle'),
  nameLabel: document.getElementById('nameLabel'),
  nameInput: document.getElementById('nameInput'),
  genBtn: document.getElementById('genBtn'),
  output: document.getElementById('output'),
  importBtn: document.getElementById('importBtn'),
  exportBtn: document.getElementById('exportBtn'),
  fileInput: document.getElementById('fileInput'),
  count: document.getElementById('count'),
  langBtns: document.querySelectorAll('.langbtn')
};

function applyLangUI(){
  const t = uiText[currentLang];
  document.documentElement.lang = currentLang;
  els.title.textContent = t.title;
  els.subtitle.textContent = t.subtitle;
  els.nameLabel.textContent = t.nameLabel;
  els.nameInput.placeholder = t.placeholder;
  els.genBtn.textContent = t.genBtn;
  els.importBtn.textContent = t.importBtn;
  els.exportBtn.textContent = t.exportBtn;
  els.output.textContent = t.emptyOutput;
  els.output.classList.add('empty');
  els.count.textContent = t.countLabel(insultData[currentLang].length);

  els.langBtns.forEach(b => b.classList.toggle('active', b.dataset.lang === currentLang));
}

els.langBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    currentLang = btn.dataset.lang;
    applyLangUI();
  });
});

els.genBtn.addEventListener('click', () => {
  const t = uiText[currentLang];
  const list = insultData[currentLang];
  const name = els.nameInput.value.trim() || t.fallbackName;
  if(!list || list.length === 0){
    alert(t.alertNoData);
    return;
  }
  const raw = list[Math.floor(Math.random() * list.length)];
  els.output.textContent = raw.replaceAll('[NAME]', name);
  els.output.classList.remove('empty');
});

els.exportBtn.addEventListener('click', () => {
  const t = uiText[currentLang];
  const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(insultData[currentLang], null, 2));
  const a = document.createElement('a');
  a.setAttribute("href", dataStr);
  a.setAttribute("download", t.exportName);
  a.click();
});

els.importBtn.addEventListener('click', () => els.fileInput.click());

els.fileInput.addEventListener('change', (event) => {
  const t = uiText[currentLang];
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try{
      const parsed = JSON.parse(e.target.result);
      if(Array.isArray(parsed)){
        insultData[currentLang] = parsed;
        els.count.textContent = t.countLabel(parsed.length);
        alert(t.alertImported(parsed.length));
      }
    }catch(err){
      alert("JSON invalide / Ogiltig JSON / Invalid JSON");
    }
  };
  reader.readAsText(file);
});

applyLangUI();
